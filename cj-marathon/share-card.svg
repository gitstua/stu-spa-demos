<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Casey Jones Marathon</title>
  <desc id="desc">Share card for the Casey Jones Marathon showing the 1,000 cm route from Kingsley's Chicken to Casey Jones Pub at 4PM Sunday.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21140f"/>
      <stop offset="55%" stop-color="#0f0f10"/>
      <stop offset="100%" stop-color="#281510"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.18" cy="0.12" r="0.4">
      <stop offset="0%" stop-color="#ef3f2f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ef3f2f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.82" cy="0.14" r="0.32">
      <stop offset="0%" stop-color="#f35f9b" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f35f9b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g filter="url(#shadow)">
    <rect x="58" y="86" width="370" height="458" rx="8" fill="#f8f3ed"/>
    <rect x="58" y="420" width="370" height="54" fill="#ef3f2f"/>
    <text x="243" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#111111">Casey Jones</text>
    <text x="243" y="266" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="82" font-weight="800" letter-spacing="3" fill="#ef3f2f">MARATHON</text>
    <text x="243" y="322" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="36" font-weight="700" letter-spacing="3" fill="#111111">FESTIVAL</text>
    <text x="243" y="384" text-anchor="middle" font-family="'Arial Narrow', Arial, sans-serif" font-size="22" font-weight="700" fill="#333333">Presented by Casey Jones Pub</text>
    <text x="243" y="456" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="30" font-weight="700" letter-spacing="2" fill="#ffffff">EVENT HOME</text>
  </g>

  <g>
    <text x="502" y="165" font-family="Impact, 'Arial Narrow', sans-serif" font-size="44" letter-spacing="2" fill="#ffd7cc">THIS WEEKEND</text>
    <text x="502" y="255" font-family="Impact, 'Arial Narrow', sans-serif" font-size="108" font-weight="800" letter-spacing="3" fill="#ffffff">CASEY JONES</text>
    <text x="502" y="345" font-family="Impact, 'Arial Narrow', sans-serif" font-size="84" font-weight="800" letter-spacing="3" fill="#ffffff">MARATHON</text>
    <text x="502" y="415" font-family="'Arial Narrow', Arial, sans-serif" font-size="30" fill="#f2ddd5">Kingsley's Chicken to Casey Jones Pub</text>
    <text x="502" y="468" font-family="'Arial Narrow', Arial, sans-serif" font-size="30" fill="#f2ddd5">Main event starts 4PM Sunday</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="510" width="202" height="72" rx="36" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="601" y="557" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="38" font-weight="800" letter-spacing="2" fill="#ffffff">1,000 CM</text>
    <rect x="724" y="510" width="332" height="72" rx="36" fill="#ef3f2f"/>
    <text x="890" y="557" text-anchor="middle" font-family="Impact, 'Arial Narrow', sans-serif" font-size="36" font-weight="800" letter-spacing="2" fill="#ffffff">REGISTER NOW</text>
  </g>
</svg>
